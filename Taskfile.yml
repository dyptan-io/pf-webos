# The front door for building/packaging pf-webos. Local development always goes
# through Docker (`build`/`check`/`package` below) — the webOS cross-toolchain
# only ships a Linux aarch64 build (see `taskfiles/toolchain.yml`), so a Linux
# aarch64 container is the one supported environment for humans, regardless of
# host OS/arch. The `native:*` tasks are the real, un-containerized logic; they
# exist for CI (`.github/workflows/build.yml`), whose runner already *is* Linux
# aarch64 — no point nesting another container inside GitHub Actions' own.
#
# The webOS-specific plumbing (fetching the cross-toolchain, staging + invoking
# ares-package, the Docker wrapper) lives in `taskfiles/toolchain.yml`, kept
# separate so this file stays short — run `task --list-all` to see everything,
# including that file's tasks under the `toolchain:` namespace.
#
# The only shell scripts left outside Task entirely are `scripts/cc-shim.sh`/
# `cxx-shim.sh` — Cargo's `linker`/`CC`/`CXX` config needs an actual executable
# path it invokes directly with a full compiler argv, not a task name.
version: '3'

# TV_HOST (used by deploy/deploy:log below) can live in a local, gitignored .env
# instead of being typed on every invocation — see .env.example.
dotenv: ['.env']

includes:
  toolchain:
    taskfile: ./taskfiles/toolchain.yml
    vars:
      NDK_DIR: '{{.NDK_DIR}}'
      SYSROOT: '{{.SYSROOT}}'
      TARGET: '{{.TARGET}}'
      RUST_IMAGE: '{{.RUST_IMAGE}}'

vars:
  NDK_DIR: .toolchains/arm-webos-linux-gnueabi_sdk-buildroot
  SYSROOT: '{{.NDK_DIR}}/arm-webos-linux-gnueabi/sysroot'
  TARGET: armv7-unknown-linux-gnueabi
  RUST_IMAGE: rust:bookworm

tasks:
  build:
    desc: Cross-compile the release binary, inside Docker — the local dev entry point
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:build}

  check:
    desc: Quick cross-target `cargo check`, inside Docker — the local dev entry point
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:check}

  package:
    desc: Build and package dist/*.ipk, inside Docker — this is the one you usually want
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:package}

  shell:
    desc: Interactive shell in the Docker build container (debugging)
    cmds:
      - task: toolchain:docker-shell

  native:build:
    desc: >-
      Cross-compile directly on the host, no Docker — only meaningful on a Linux
      aarch64 box with Rust already installed (used by CI; `build` is the local
      dev entry point).
    deps: [toolchain:all]
    env:
      # Modern CMake refuses vendored libopus's old cmake_minimum_required
      # (audiopus_sys, pulled in transitively by punktfunk-core's `quic` feature).
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    cmds:
      - rustup target add {{.TARGET}}
      - cargo build --release --target {{.TARGET}}

  native:check:
    desc: Quick cross-target `cargo check`, no Docker (used by CI)
    deps: [toolchain:all]
    env:
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    cmds:
      - rustup target add {{.TARGET}}
      - cargo check --target {{.TARGET}}

  native:package:
    desc: Build and package dist/*.ipk, no Docker (used by CI)
    deps: [native:build, toolchain:ares-package]
    cmds:
      - task: toolchain:stage-and-package

  deploy:
    desc: >-
      Build, package, install on a real TV over SSH, and launch it — useful for
      iterating/debugging on real hardware. Usage: task deploy TV_HOST=root@<tv-ip>
      (or set TV_HOST in .env, see .env.example)
    deps: [package]
    requires:
      vars: [TV_HOST]
    cmds:
      - task: toolchain:deploy
        vars: {TV_HOST: '{{.TV_HOST}}'}

  deploy:log:
    desc: >-
      Tail the app's log file on the TV over SSH. Usage:
      task deploy:log TV_HOST=root@<tv-ip>
    requires:
      vars: [TV_HOST]
    cmds:
      - ssh {{.TV_HOST}} "tail -f /tmp/punktfunk-webos.log"

  clean:
    desc: Remove local build output (dist/) — keeps the toolchain/cargo caches
    cmds:
      - rm -rf dist

  clean:all:
    desc: Remove everything — dist/, .toolchains/, target/, and the Docker volumes
    cmds:
      - task: clean
      - rm -rf .toolchains target
      - task: toolchain:docker-volumes-rm
