# `build`/`check`/`package` (local dev) always run inside Docker, since the
# webOS cross-toolchain only ships a Linux aarch64 build. `native:*` is the
# same logic without Docker, used by CI (already a Linux aarch64 runner).
# webOS-specific plumbing lives in `taskfiles/toolchain.yml`, kept separate so
# this file stays short.
version: '3'

# Suppress go-task's echo of each command before it runs — keeps task output
# to just the command's own output (less noise, fewer tokens when read back).
silent: true

# TV_HOST (used by deploy/deploy:log below) can live in a local, gitignored .env
# instead of being typed on every invocation — see .env.example.
dotenv: ['.env']

includes:
  toolchain:
    taskfile: ./taskfiles/toolchain.yml
    vars:
      NDK_DIR: '{{.NDK_DIR}}'
      SYSROOT: '{{.SYSROOT}}'
      TARGET: '{{.TARGET}}'
      RUST_IMAGE: '{{.RUST_IMAGE}}'

vars:
  NDK_DIR: .toolchains/arm-webos-linux-gnueabi_sdk-buildroot
  SYSROOT: '{{.NDK_DIR}}/arm-webos-linux-gnueabi/sysroot'
  TARGET: armv7-unknown-linux-gnueabi
  RUST_IMAGE: rust:bookworm
  PKG_VERSION:
    sh: |
      if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
        echo "${GITHUB_REF_NAME#v}"
      else
        LATEST=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo 0.0.1)
        SHA=$(git rev-parse --short=8 HEAD 2>/dev/null || echo unknown)
        echo "${LATEST}+git.${SHA}"
      fi

tasks:
  build:
    desc: Cross-compile the release binary, inside Docker — the local dev entry point
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:build}

  check:
    desc: Quick cross-target `cargo check`, inside Docker — the local dev entry point
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:check}

  package:
    desc: Build and package dist/*.ipk, inside Docker — this is the one you usually want
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:package}

  lint:
    desc: Cross-target `cargo clippy` (the lint set in Cargo.toml's `[lints.clippy]`), inside Docker
    cmds:
      - task: toolchain:docker-run
        vars: {TARGET_TASK: native:lint}

  fmt:
    desc: Format the whole crate with rustfmt (native — formatting doesn't need the cross toolchain)
    cmds:
      - cargo fmt

  native:build:
    desc: >-
      Cross-compile directly on the host, no Docker — only meaningful on a Linux
      aarch64 box with Rust already installed (used by CI; `build` is the local
      dev entry point).
    deps: [toolchain:all]
    env:
      # Modern CMake refuses vendored libopus's old cmake_minimum_required
      # (audiopus_sys, pulled in transitively by punktfunk-core's `quic` feature).
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
      # Thread the packaged version into the binary so the UI's build marker matches
      # the .ipk (Cargo.toml stays a fixed 0.0.1; recomputed inside Docker from the
      # mounted repo's git, so both `build` and CI's `native:build` pick it up).
      PKG_VERSION: '{{.PKG_VERSION}}'
    cmds:
      - rustup target add {{.TARGET}}
      - cargo build --release --target {{.TARGET}}

  native:check:
    desc: Quick cross-target `cargo check`, no Docker (used by CI)
    deps: [toolchain:all]
    env:
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    cmds:
      - rustup target add {{.TARGET}}
      - cargo check --target {{.TARGET}}

  native:lint:
    desc: Cross-target `cargo clippy`, no Docker (used by CI)
    deps: [toolchain:all]
    env:
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    cmds:
      - rustup target add {{.TARGET}}
      - rustup component add clippy
      - cargo clippy --target {{.TARGET}} --all-targets -- -D warnings

  native:package:
    desc: Build and package dist/*.ipk, no Docker (used by CI)
    deps: [native:build, toolchain:ares-package]
    cmds:
      - task: toolchain:stage-and-package
        vars:
          PKG_VERSION: '{{.PKG_VERSION}}'

  deploy:
    desc: >-
      Build, package, install on a real TV over SSH, and launch it. Usage:
      task deploy TV_HOST=root@<tv-ip> (or set TV_HOST in .env)
    deps: [package]
    requires:
      vars: [TV_HOST]
    vars:
      IPK: dist/io.dyptan.punktfunk.webos_{{.PKG_VERSION}}_arm.ipk
    cmds:
      - test -f "{{.IPK}}" || exit 1
      - scp "{{.IPK}}" {{.TV_HOST}}:/tmp/
      - >-
        ssh -tt {{.TV_HOST}}
        "luna-send -i -n 1 -f luna://com.webos.appInstallService/dev/install
        '{\"id\":\"io.dyptan.punktfunk.webos\",\"ipkUrl\":\"/tmp/$(basename {{.IPK}})\",\"subscribe\":true}'"
      - sleep 3
      - >-
        ssh -tt {{.TV_HOST}}
        "luna-send -n 1 -f luna://com.webos.applicationManager/launch '{\"id\":\"io.dyptan.punktfunk.webos\"}'"

  deploy:log:
    desc: >-
      Tail the app's log file on the TV over SSH. Usage:
      task deploy:log TV_HOST=root@<tv-ip>
    requires:
      vars: [TV_HOST]
    cmds:
      - ssh {{.TV_HOST}} "tail -f /tmp/punktfunk-webos.log"

  clean:
    desc: Remove everything — dist/, .toolchains/, target/, and the Docker volumes
    cmds:
      - rm -rf dist
      - rm -rf .toolchains target
      - docker volume rm -f pf-webos-toolchains pf-webos-target pf-webos-cargo pf-webos-apt-cache pf-webos-apt-lists pf-webos-tools
